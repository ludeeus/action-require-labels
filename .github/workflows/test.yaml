name: "Test"

on:
  pull_request:
    branches:
      - main
    types:
      - labeled
      - opened
      - synchronize
      - unlabeled

permissions: {}

jobs:
  run_the_action:
    name: "Run the action (${{ matrix.os }})"
    if: github.event.pull_request.labels[0] != null
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-13
          - macos-latest
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - ubuntu-slim
          - windows-11-arm
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run the local action
        uses: ./
        with:
          labels: >-
            bugfix, breaking-change, new-feature, dependencies, ci, documentation, internal, refactor

  run_the_action_maximum_matching_labels:
    name: "Run the action (maximum_matching_labels, ${{ matrix.os }})"
    if: github.event.pull_request.labels[0] != null
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-13
          - macos-latest
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - ubuntu-slim
          - windows-11-arm
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run the local action
        uses: ./
        with:
          labels: >-
            bugfix, breaking-change, new-feature, dependencies, ci, documentation, internal, refactor
          maximum_matching_labels: 1

  run_the_action_inverted:
    name: "Run the action (inverted, ${{ matrix.os }})"
    if: github.event.pull_request.labels[0] != null
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-13
          - macos-latest
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - ubuntu-slim
          - windows-11-arm
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run the local action
        id: blocking
        continue-on-error: true
        uses: ./
        with:
          labels: >-
            do-not-merge, wip, blocked

      - name: Fail if a blocking label is present
        if: steps.blocking.outcome == 'success'
        shell: bash
        run: |
          echo "::error::A blocking label is present on the pull request."
          exit 1
