name: "Test"

on:
  pull_request:
    branches:
      - main
    types:
      - labeled
      - opened
      - synchronize
      - unlabeled

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_the_action:
    name: "Run the action (${{ matrix.os }})"
    if: github.event.pull_request.labels[0] != null
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: &os_matrix
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run the local action
        uses: ./
        with:
          labels: >-
            bugfix, breaking-change, new-feature, dependencies, ci, documentation, internal, refactor

  run_the_action_maximum_matching_labels:
    name: "Run the action (maximum_matching_labels, ${{ matrix.os }})"
    if: github.event.pull_request.labels[0] != null
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: *os_matrix
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run the local action
        uses: ./
        with:
          labels: >-
            bugfix, breaking-change, new-feature, dependencies, ci, documentation, internal, refactor
          maximum_matching_labels: 1

  run_the_action_inverted:
    name: "Run the action (inverted, ${{ matrix.os }})"
    if: github.event.pull_request.labels[0] != null
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: *os_matrix
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run the local action
        id: blocking
        continue-on-error: true
        uses: ./
        with:
          labels: >-
            do-not-merge, wip, blocked

      - name: Fail if a blocking label is present
        if: steps.blocking.outcome == 'success'
        run: |
          echo "::error::A blocking label is present on the pull request."
          exit 1
