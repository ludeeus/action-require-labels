name: "Test"

on:
  pull_request:
    branches:
      - main
    types:
      - labeled
      - opened
      - synchronize
      - unlabeled

permissions: {}

jobs:
  run_the_action:
    name: "Run the action"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run the local action
        uses: ./
        with:
          labels: >-
            bugfix, breaking-change, new-feature, dependencies
